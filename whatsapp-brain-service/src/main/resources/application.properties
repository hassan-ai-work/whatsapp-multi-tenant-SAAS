spring.application.name=whatsapp-brain-service
server.port=8080

# Core Database Connection
spring.datasource.url=jdbc:postgresql://localhost:5432/replato
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Keycloak Administration Connection Properties
keycloak.server-url=http://localhost:8180
keycloak.realm=replato-gateway
keycloak.username=admin
keycloak.password=admin

# JPA / JSON support
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Multipart upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Kafka (Connected to EXTERNAL listener on host port 9092)
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

app.kafka.topics.document-ingestion=document-ingestion-topic

# MinIO / S3 Custom Properties (Synced with Docker API port 9005)
app.storage.s3.endpoint=http://localhost:9005
app.storage.s3.region=us-east-1
app.storage.s3.bucket=document-ingestion
app.storage.s3.access-key=local-access-key
app.storage.s3.secret-key=local-secret-key
app.storage.s3.path-style-access-enabled=true

# Spring Cloud AWS Official Configuration
spring.cloud.aws.region.static=us-east-1
spring.cloud.aws.s3.region=us-east-1
spring.cloud.aws.s3.endpoint=http://localhost:9005
spring.cloud.aws.s3.path-style-access-enabled=true
spring.cloud.aws.credentials.access-key=local-access-key
spring.cloud.aws.credentials.secret-key=local-secret-key
