services:
  postgres:
    # Changed from postgres:16.3 to the official pgvector image compiled for PostgreSQL 16
    image: pgvector/pgvector:pg16
    container_name: replato-postgres
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: replato
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data:Z
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:Z
