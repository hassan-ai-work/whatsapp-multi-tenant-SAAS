spring.application.name=kafka-service
spring.config.import=optional:file:.env[.properties]

# Disable incompatible or unused auto-configurations.
# This service uses its own explicit S3 client configuration and does not
# rely on Spring AI PgVectorStore auto-configuration for startup.
spring.autoconfigure.exclude=\
  io.awspring.cloud.autoconfigure.s3.S3AutoConfiguration,\
  org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration

# Core Database Connection
spring.datasource.url=jdbc:postgresql://localhost:5432/replato
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate

#### Kafka Consumer Configuration (Connected to EXTERNAL listener on host port 9092)
# --- Kafka Cluster Bootstrap Connection ---
spring.kafka.bootstrap-servers=localhost:9092

# --- Consumer Group Core Identifiers ---
spring.kafka.consumer.group-id=document-ingestion-consumer
spring.kafka.consumer.auto-offset-reset=earliest

# --- Error Handling Deserializer Configuration (Prevents Infinite Loops) ---
spring.kafka.consumer.key-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

# --- Direct Serializer Strategy Fallback Delegates ---
spring.kafka.consumer.properties.spring.deserializer.key.delegate.class=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer

# --- JSON Mapping Engine Type Handlers ---
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.trusted.packages=com.levosoft.microservice.kafka.document.dto
spring.kafka.consumer.properties.spring.json.value.default.type=com.levosoft.microservice.kafka.document.dto.DocumentIngestionEvent



# Application Specific Kafka Topics
app.kafka.topics.document-ingestion=document-ingestion-topic

# MinIO / S3 Custom Properties (Synced with Docker API port 9005)
app.storage.s3.endpoint=http://localhost:9005
app.storage.s3.region=us-east-1
app.storage.s3.bucket=document-ingestion
app.storage.s3.access-key=local-access-key
app.storage.s3.secret-key=local-secret-key
app.storage.s3.path-style-access-enabled=true

# Spring Cloud AWS Official Configuration
spring.cloud.aws.region.static=us-east-1
spring.cloud.aws.s3.region=us-east-1
spring.cloud.aws.s3.endpoint=http://localhost:9005
spring.cloud.aws.s3.path-style-access-enabled=true
spring.cloud.aws.credentials.access-key=local-access-key
spring.cloud.aws.credentials.secret-key=local-secret-key

# Spring AI / PGVector Config
spring.ai.vectorstore.pgvector.initialize-schema=false
app.embedding.provider=${APP_EMBEDDING_PROVIDER:ollama}
app.embedding.fallback-enabled=${APP_EMBEDDING_FALLBACK_ENABLED:true}

# OpenAI embedding config
spring.ai.openai.api-key=${SPRING_AI_OPENAI_API_KEY:}
spring.ai.openai.embedding.options.model=${SPRING_AI_OPENAI_EMBEDDING_OPTIONS_MODEL:text-embedding-3-small}

# Ollama embedding config
spring.ai.ollama.base-url=${SPRING_AI_OLLAMA_BASE_URL:http://localhost:11434}
spring.ai.ollama.embedding.options.model=${SPRING_AI_OLLAMA_EMBEDDING_OPTIONS_MODEL:bge-m3}

