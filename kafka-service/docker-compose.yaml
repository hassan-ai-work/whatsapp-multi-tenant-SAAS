services:
  # --- Apache Kafka Broker (KRaft Mode) ---
  kafka:
    image: apache/kafka:latest
    container_name: kafka-broker
    ports:
      - "9092:9092" # Exposed directly so your local host-driven Spring Boot apps can connect
    environment:
      # --- KRaft Configuration (No Zookeeper Needed) ---
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      # --- Networking & Listeners ---
      KAFKA_LISTENERS: 'INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093'
      KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://kafka:29092,EXTERNAL://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      # Specific relative mapping with Fedora's :Z SELinux tag
      - ./kafka-data:/var/lib/kafka/data:Z

  # --- Kafbat UI Management Dashboard ---
  kafka-ui:
    image: kafbat/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8989:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local-cluster
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:29092
      - SERVER_SERVLET_CONTEXT_PATH=/kafka-ui
    depends_on:
      - kafka

  # --- MinIO Local S3 Storage Simulator ---
  minio:
    image: minio/minio:latest
    container_name: local-s3-server
    ports:
      - "9005:9000" # MinIO API Port (used by Spring Boot)
      - "9006:9001" # MinIO Web Console UI (used by browser)
    environment:
      MINIO_ROOT_USER: local-access-key
      MINIO_ROOT_PASSWORD: local-secret-key
    volumes:
      # Persists your uploaded PDFs on your machine using Fedora's SELinux flag
      - ./minio-data:/data:Z
    command: server /data --console-address ":9001"
